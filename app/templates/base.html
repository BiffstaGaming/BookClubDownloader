<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}BookClub{% endblock %}</title>

  <!-- Bootstrap 5 (dark-mode aware) -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <!-- Custom app styles -->
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>

  <!-- Top Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bc-navbar mb-4">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <i class="bi bi-book-half text-accent fs-4"></i>
        <span class="fw-bold">BookClub</span>
      </a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNav"
        aria-controls="mainNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item">
            <a class="nav-link" href="/">
              <i class="bi bi-search me-1"></i>Search
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/downloads">
              <i class="bi bi-download me-1"></i>Downloads
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/settings">
              <i class="bi bi-gear me-1"></i>Settings
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- HTMX loading indicator -->
  <div class="htmx-indicator bc-loading-bar" id="global-indicator">
    <div class="bc-loading-inner">
      <div class="spinner-border spinner-border-sm text-accent me-2" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <span class="text-muted small">Loading&hellip;</span>
    </div>
  </div>

  <!-- Main content -->
  <main class="container-fluid px-4 pb-5">
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap JS bundle -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmxaJcQRkN4SJ3w3VqM/tGKqnrl"
    crossorigin="anonymous"
  ></script>
  <!-- HTMX -->
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.10/dist/htmx.min.js"></script>
  <script>
    document.body.addEventListener('htmx:beforeRequest', function () {
      document.getElementById('global-indicator').style.display = 'flex';
    });
    document.body.addEventListener('htmx:afterRequest', function () {
      document.getElementById('global-indicator').style.display = 'none';
    });
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
