{% extends "base.html" %}
{% block title %}BookClub — Logs{% endblock %}

{% block content %}
<div class="row g-4">
  <div class="col-12">
    <h4 class="page-title mb-4">
      <i class="bi bi-terminal me-2 text-accent"></i>
      Application Logs
    </h4>
  </div>

  <div class="col-12">
    <div class="bc-card">
      <div class="bc-card-header d-flex align-items-center justify-content-between flex-wrap gap-2">

        <!-- Level filter -->
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <span class="text-muted small me-1">Level:</span>
          {% for lvl in ["ALL","DEBUG","INFO","WARNING","ERROR"] %}
          <button
            class="btn btn-sm level-filter-btn {% if lvl == 'ALL' %}active-filter{% endif %}"
            data-level="{{ lvl }}"
            onclick="setLevelFilter('{{ lvl }}')"
          >{{ lvl }}</button>
          {% endfor %}
        </div>

        <div class="d-flex align-items-center gap-2 flex-wrap">
          <!-- Limit selector -->
          <span class="text-muted small">Max rows:</span>
          <select id="log-limit" class="form-select form-select-sm" style="width:auto;" onchange="setLogLimit(this.value)">
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="250">250</option>
            <option value="500">500</option>
            <option value="0">All</option>
          </select>

          <!-- Clear button -->
          <button
            class="btn btn-sm"
            style="background:var(--danger-dim);border:1px solid rgba(240,71,71,0.3);color:var(--danger);"
            hx-delete="/logs"
            hx-target="#log-rows-wrap"
            hx-swap="innerHTML"
            hx-confirm="Clear all log entries?"
          >
            <i class="bi bi-trash3 me-1"></i>Clear All
          </button>
        </div>
      </div>

      <div class="bc-card-body p-0">
        <div class="table-responsive">
          <table class="table bc-table mb-0" style="font-size:0.8rem;">
            <thead>
              <tr>
                <th style="width:155px;">Time</th>
                <th style="width:90px;">Level</th>
                <th style="width:110px;">Source</th>
                <th>Message</th>
                <th style="width:80px;">Download</th>
              </tr>
            </thead>
            <tbody
              id="log-rows-wrap"
              hx-get="/logs/entries?level=ALL&limit=50"
              hx-trigger="load, every 15s"
              hx-swap="innerHTML"
            ></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<style>
.level-filter-btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: 5px;
  padding: 0.2rem 0.6rem;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  transition: background 0.15s, color 0.15s;
}
.level-filter-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
.level-filter-btn.active-filter { background: var(--accent); border-color: var(--accent); color: #fff; }
</style>
<script>
function _logUrl() {
  var level = (document.querySelector('.level-filter-btn.active-filter') || {dataset:{level:'ALL'}}).dataset.level;
  var limit = document.getElementById('log-limit').value;
  return '/logs/entries?level=' + level + '&limit=' + limit;
}
function setLevelFilter(level) {
  document.querySelectorAll('.level-filter-btn').forEach(function(btn) {
    btn.classList.toggle('active-filter', btn.dataset.level === level);
  });
  var url = _logUrl();
  var tbody = document.getElementById('log-rows-wrap');
  tbody.setAttribute('hx-get', url);
  htmx.ajax('GET', url, { target: '#log-rows-wrap', swap: 'innerHTML' });
}
function setLogLimit(limit) {
  var url = _logUrl();
  var tbody = document.getElementById('log-rows-wrap');
  tbody.setAttribute('hx-get', url);
  htmx.ajax('GET', url, { target: '#log-rows-wrap', swap: 'innerHTML' });
}
</script>
{% endblock %}
