{% extends "base.html" %}
{% block title %}BookClub — Search{% endblock %}

{% block content %}
<div class="row g-4">
  <div class="col-12">
    <h4 class="page-title mb-4">
      <i class="bi bi-music-note-beamed me-2 text-accent"></i>
      Find an Audiobook
    </h4>
  </div>

  <!-- Step 1: Search Forum -->
  <div class="col-12">
    <div class="bc-card step-card">
      <div class="bc-card-header d-flex align-items-center gap-3">
        <span class="step-badge">1</span>
        <span>Search abook.link Forum</span>
        <span class="htmx-indicator ms-auto spinner-border spinner-border-sm text-accent" role="status">
          <span class="visually-hidden">Searching…</span>
        </span>
      </div>
      <div class="bc-card-body">
        <form
          hx-post="/search/forum"
          hx-target="#forum-results"
          hx-swap="innerHTML"
          hx-indicator=".htmx-indicator"
        >
          <div class="input-group">
            <span class="input-group-text bc-input-addon">
              <i class="bi bi-search"></i>
            </span>
            <input
              type="text"
              name="query"
              class="form-control bc-input"
              placeholder="e.g. Stephen King The Stand"
              required
              autofocus
            />
            <button type="submit" class="btn bc-btn-primary px-4">
              <i class="bi bi-search me-1"></i>Search Forum
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Forum Results -->
  <div class="col-12" id="forum-results"></div>

  <!-- Step 2 / Post Detail (populated after selecting a forum result) -->
  <div class="col-12" id="post-detail"></div>

  <!-- Step 3 / NZB Results (populated after thanking a post) -->
  <div class="col-12" id="nzb-results"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  // After HTMX loads post-detail or nzb-results, scroll smoothly into view
  document.body.addEventListener('htmx:afterSwap', function(evt) {
    var id = evt.detail.target.id;
    if (id === 'post-detail' || id === 'nzb-results') {
      setTimeout(function() {
        evt.detail.target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 50);
    }
  });
</script>
{% endblock %}
